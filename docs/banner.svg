<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open Nursing Knowledge Explorer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2e33"/>
      <stop offset="55%" stop-color="#0f4c5c"/>
      <stop offset="100%" stop-color="#0b2e33"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5ee6c8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5ee6c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <circle cx="930" cy="140" r="220" fill="url(#glow)"/>

  <!-- decorative knowledge graph, right side -->
  <g stroke="#3fa9a0" stroke-width="1.4" opacity="0.65">
    <line x1="820" y1="70" x2="900" y2="120"/>
    <line x1="820" y1="70" x2="960" y2="55"/>
    <line x1="900" y1="120" x2="960" y2="55"/>
    <line x1="900" y1="120" x2="960" y2="175"/>
    <line x1="900" y1="120" x2="1000" y2="120"/>
    <line x1="960" y1="175" x2="1050" y2="185"/>
    <line x1="960" y1="175" x2="1000" y2="120"/>
    <line x1="1000" y1="120" x2="1080" y2="90"/>
    <line x1="1000" y1="120" x2="1070" y2="150"/>
    <line x1="960" y1="55" x2="1050" y2="40"/>
    <line x1="820" y1="70" x2="770" y2="130"/>
    <line x1="770" y1="130" x2="900" y2="120"/>
    <line x1="770" y1="130" x2="820" y2="200"/>
    <line x1="820" y1="200" x2="960" y2="175"/>
  </g>
  <g fill="#5ee6c8">
    <circle cx="820" cy="70" r="7"/>
    <circle cx="900" cy="120" r="10"/>
    <circle cx="960" cy="55" r="6"/>
    <circle cx="960" cy="175" r="8"/>
    <circle cx="1000" cy="120" r="6"/>
    <circle cx="1050" cy="185" r="5"/>
    <circle cx="1080" cy="90" r="5"/>
    <circle cx="1070" cy="150" r="5"/>
    <circle cx="1050" cy="40" r="5"/>
    <circle cx="770" cy="130" r="7"/>
    <circle cx="820" cy="200" r="6"/>
  </g>

  <!-- title -->
  <text x="70" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#f4faf9" font-weight="600">Open Nursing</text>
  <text x="70" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#5ee6c8" font-weight="600">Knowledge Explorer</text>
  <text x="72" y="205" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#bfe3df">The NMC Code, proficiency platforms, annexes and SSSA — as one open, cross-linked graph</text>
  <text x="72" y="235" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#7fb8b0">Built by Nursing Citizen Development CIC · on the OKF Explorer by Chris Page</text>
</svg>
